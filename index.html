<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAPEAL Risk Advisor</title>
<style>
:root{--azul:#1B4F8A;--naranja:#E85D24;--naranja-c:#fdf0eb;--azul-c:#e8f0fb;--gris:#f5f6f8;--borde:#e2e5ea;--gtxt:#6b7280;--txt:#1a1f2e;--blanco:#fff;--verde:#16a34a;--amarillo:#d97706;--rojo:#dc2626;--rojo-c:#fef2f2;--amarillo-c:#fffbeb;--verde-c:#f0fdf4}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:var(--gris);color:var(--txt);min-height:100vh}
header{background:var(--azul);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;box-shadow:0 2px 8px rgba(27,79,138,.3)}
.hbrand{display:flex;align-items:center;gap:.75rem}
.hlogo{width:36px;height:36px;background:var(--naranja);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:14px}
.htitle{color:#fff;font-size:15px;font-weight:600}
.hsub{color:rgba(255,255,255,.6);font-size:11px;letter-spacing:1px;text-transform:uppercase}
.hbadge{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);padding:4px 10px;border-radius:20px;font-size:11px;border:1px solid rgba(255,255,255,.2)}
main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
#zona{background:#fff;border:2px dashed var(--borde);border-radius:12px;padding:3rem 2rem;text-align:center;margin-bottom:2rem}
#zona h2{font-size:16px;color:var(--azul);margin-bottom:.5rem;font-weight:600}
#zona p{color:var(--gtxt);font-size:13px;margin-bottom:1.25rem}
textarea{width:100%;height:140px;border:1px solid var(--borde);border-radius:8px;padding:.75rem 1rem;font-size:12px;font-family:monospace;resize:vertical;outline:none;background:var(--gris)}
textarea:focus{border-color:var(--azul);background:#fff}
.btn1{background:var(--naranja);color:#fff;border:none;padding:10px 28px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:1rem}
.btn1:hover{background:#c94d1d}
.btn2{background:transparent;color:var(--azul);border:1px solid var(--azul);padding:9px 20px;border-radius:8px;font-size:13px;cursor:pointer;margin-top:1rem;margin-left:.5rem}
.btn2:hover{background:var(--azul-c)}
#err{color:var(--rojo);font-size:13px;margin-top:.75rem;display:none}
#dash{display:none}
.gtop{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.gbot{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1rem}
.card{background:#fff;border-radius:10px;padding:1.25rem 1.5rem;border:1px solid var(--borde);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.ctit{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--gtxt);font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:.4rem}
.ctit::before{content:'';display:inline-block;width:3px;height:12px;background:var(--naranja);border-radius:2px}
.cnombre{font-size:22px;font-weight:700;color:var(--azul);margin-bottom:.75rem}
.badges{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.75rem}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.ba{background:var(--azul-c);color:var(--azul)}
.bn{background:var(--naranja-c);color:var(--naranja)}
.bg{background:var(--gris);color:var(--gtxt)}
.cmeta{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.mi label{font-size:10px;text-transform:uppercase;color:var(--gtxt);letter-spacing:.8px;display:block;margin-bottom:2px}
.mi span{font-size:13px;font-weight:500}
.oprod{font-size:28px;font-weight:800;color:var(--naranja);text-transform:uppercase;letter-spacing:1px;margin-bottom:.25rem}
.olabel{font-size:11px;color:var(--gtxt);margin-bottom:1rem}
.pgrande{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;font-size:20px;font-weight:900;margin-bottom:.75rem}
.pa{background:var(--rojo-c);color:var(--rojo)}
.pb{background:var(--amarillo-c);color:var(--amarillo)}
.pc{background:var(--verde-c);color:var(--verde)}
.odet{display:flex;gap:1rem;align-items:center}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.75rem}
.ci{background:var(--gris);padding:.5rem .75rem;border-radius:6px}
.ci label{font-size:9px;text-transform:uppercase;color:var(--gtxt);letter-spacing:.8px;display:block;margin-bottom:2px}
.ci span{font-size:12px;font-weight:600}
.slista{display:flex;flex-direction:column;gap:.6rem}
.sitem{display:flex;align-items:center;gap:.75rem}
.slabel{font-size:12px;width:130px;flex-shrink:0;font-weight:500}
.sbg{flex:1;height:8px;background:var(--borde);border-radius:4px;overflow:hidden}
.sfill{height:100%;border-radius:4px}
.sval{font-size:12px;font-weight:700;width:16px;text-align:right;flex-shrink:0}
.s0 .sfill{background:var(--borde);width:0}.s0 .sval{color:var(--borde)}
.s1 .sfill{background:#93c5fd;width:20%}.s1 .sval{color:#93c5fd}
.s2 .sfill{background:#60a5fa;width:40%}.s2 .sval{color:#60a5fa}
.s3 .sfill{background:var(--amarillo);width:60%}.s3 .sval{color:var(--amarillo)}
.s4 .sfill{background:var(--naranja);width:80%}.s4 .sval{color:var(--naranja)}
.s5 .sfill{background:var(--rojo);width:100%}.s5 .sval{color:var(--rojo)}
.star{color:var(--naranja);font-size:10px;margin-left:2px}
.pgrid{display:flex;flex-direction:column;gap:.5rem}
.pitem{display:flex;align-items:center;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid var(--gris)}
.plabel{font-size:12px;font-weight:500}
.pval{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.pv-deficiente{background:var(--rojo-c);color:var(--rojo)}
.pv-adecuada{background:var(--amarillo-c);color:var(--amarillo)}
.pv-buena{background:#eff6ff;color:#2563eb}
.pv-excelente{background:var(--verde-c);color:var(--verde)}
.pv-dato_no_disponible{background:var(--gris);color:var(--gtxt)}
.rescard{display:flex;align-items:center;gap:1rem;padding:1rem;background:var(--azul-c);border-radius:8px;margin-bottom:1rem}
.resav{width:42px;height:42px;border-radius:50%;background:var(--azul);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
.resnombre{font-size:16px;font-weight:700;color:var(--azul);text-transform:capitalize}
.resrol{font-size:11px;color:var(--gtxt)}
.paso{background:var(--naranja);color:#fff;padding:.75rem 1rem;border-radius:8px;display:flex;align-items:center;gap:.75rem}
.pasoico{font-size:18px}
.pasotxt{font-size:13px;font-weight:600}
.pasosub{font-size:11px;opacity:.85}
.argtxt{font-size:14px;line-height:1.65;font-style:italic;border-left:3px solid var(--naranja);padding-left:1rem}
.etags{display:flex;flex-wrap:wrap;gap:.4rem}
.etag{background:var(--azul-c);color:var(--azul);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.ritem{padding:.75rem;border-radius:8px;margin-bottom:.5rem;border-left:3px solid}
.rcritico{background:var(--rojo-c);border-color:var(--rojo)}
.ralto{background:var(--naranja-c);border-color:var(--naranja)}
.rmedio{background:var(--amarillo-c);border-color:var(--amarillo)}
.rbajo{background:var(--verde-c);border-color:var(--verde)}
.rarea{font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:3px}
.rcritico .rarea{color:var(--rojo)}.ralto .rarea{color:var(--naranja)}.rmedio .rarea{color:var(--amarillo)}
.rdesc{font-size:12px;line-height:1.5}
.rhip{font-size:10px;color:var(--gtxt);margin-top:3px;font-style:italic}
.obstxt{font-size:12px;line-height:1.7;background:var(--gris);padding:.75rem;border-radius:6px}
.cfull{margin-bottom:1rem}
.footer{display:flex;align-items:center;justify-content:space-between;padding:1rem 0;border-top:1px solid var(--borde);margin-top:1rem}
.fmeta{font-size:11px;color:var(--gtxt)}
.facc{display:flex;gap:.5rem}
.alerta{background:var(--amarillo-c);border:1px solid #fcd34d;border-radius:8px;padding:.75rem 1rem;font-size:12px;color:#92400e;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.sectitem{display:flex;align-items:center;gap:.75rem;padding:.5rem 0;border-bottom:1px solid var(--gris)}
.sectprod{font-size:11px;font-weight:600;color:var(--azul);width:160px;text-transform:uppercase}
.sectmot{font-size:12px;color:var(--gtxt);flex:1}
@media(max-width:768px){.gtop,.gbot{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="hbrand">
    <div class="hlogo">D</div>
    <div><div class="htitle">DAPEAL Correduría de Seguros</div><div class="hsub">Risk Advisor — Dashboard</div></div>
  </div>
  <span class="hbadge">v1.2</span>
</header>
<main>
  <div id="zona">
    <h2>Cargar análisis de Risk Advisor</h2>
    <p>Pega el JSON generado por el Project (Particulares o Empresas)</p>
    <textarea id="jin" placeholder='{"meta": {"version_modelo": "1.2", "linea": "particulares", ...}}'></textarea>
    <br>
    <button class="btn1" onclick="load()">Cargar análisis</button>
    <button class="btn2" onclick="demo()">Ver ejemplo</button>
    <div id="err">JSON inválido. Revisa el formato.</div>
  </div>
  <div id="dash">
    <div id="alerta" class="alerta" style="display:none">Datos insuficientes: revisar antes de actuar.</div>
    <div class="gtop"><div class="card" id="cc"></div><div class="card" id="co"></div></div>
    <div class="gbot"><div class="card" id="cs"></div><div class="card" id="cp"></div><div class="card" id="cr"></div></div>
    <div class="gtop"><div class="card cfull" id="ck"></div><div class="card cfull" id="ca"></div></div>
    <div class="gtop"><div class="card" id="ce"></div><div class="card" id="cb"></div></div>
    <div class="card cfull" id="cse" style="display:none;margin-bottom:1rem"></div>
    <div class="footer"><div class="fmeta" id="fm"></div><div class="facc"><button class="btn2" onclick="reset()">← Nuevo</button><button class="btn1" onclick="exp()">Exportar JSON</button></div></div>
  </div>
</main>
<script>
const NP={vida:'Vida',salud:'Salud',ilt:'ILT',decesos:'Decesos',dependencia:'Dependencia',hogar:'Hogar',proteccion_juridica:'Protección Jurídica',mascotas:'Mascotas',auto:'Auto',rc_general:'RC General',rc_profesional:'RC Profesional',dyo:'D&O',ciber:'Ciber',multirriesgo:'Multirriesgo',proteccion_juridica_empresa:'Prot. Jurídica Empresa',convenio:'Convenio',colectivo_salud:'Colectivo Salud',colectivo_vida_accidentes:'Colectivo Vida/Acc.'};
const RR={natalia:'Vida · Salud · ILT · Decesos · Dependencia',pilar:'Hogar · Auto · Mascotas · Protección Jurídica',gemma:'Empresas · RC · D&O · Ciber · Multirriesgo',direccion:'Casos estratégicos · Alto valor'};
const AI={llamada:'📞',email:'✉️',reunion:'🤝',cotizacion:'📋',seguimiento:'🔄'};
let D=null;
function load(){
  const t=document.getElementById('jin').value.trim();
  try{const d=JSON.parse(t);if(!d.meta||!d.cliente)throw 1;document.getElementById('err').style.display='none';D=d;render(d);}
  catch(e){document.getElementById('err').style.display='block';}
}
function demo(){
  D={"meta":{"version_modelo":"1.2","linea":"particulares","fecha_analisis":"2026-06-16","fuente":"formulario_diagnostico","datos_suficientes":false},"cliente":{"nombre":"Ángel Jesús Durán González","edad":0,"perfil_principal":"autonomo","perfil_secundario":"sin_perfil_secundario","situacion_familiar":"con_pareja_con_hijos","situacion_profesional":"autonomo_comercio","madurez_aseguradora":"intermedio"},"evaluacion_proteccion":{"ingresos":"deficiente","familiar":"buena","patrimonial":"adecuada","juridica":"dato_no_disponible","sanitaria":"buena"},"riesgos_detectados":[{"area":"ingresos","descripcion":"Autónomo sin cobertura de ILT. Si no puede trabajar, pérdida total de ingresos.","nivel_riesgo":"critico","impacto_potencial":"Desprotección económica familiar inmediata.","tipo_dato":"hecho"},{"area":"familiar","descripcion":"Familia multiedad dependiente sin protección complementaria.","nivel_riesgo":"alto","impacto_potencial":"Desprotección si el sustentador falla.","tipo_dato":"hecho"}],"riesgos_bien_protegidos":[{"area":"vivienda","descripcion":"Póliza de hogar activa."},{"area":"salud","descripcion":"Cobertura sanitaria contratada."}],"scoring_productos":{"vida":3,"salud":0,"ilt":5,"decesos":0,"dependencia":0,"hogar":2,"proteccion_juridica":0,"mascotas":0,"auto":0},"prioridades":[{"orden":1,"producto_area":"ilt","motivo":"Autónomo con familia dependiente.","nivel_urgencia":"inmediata"}],"producto_objetivo_principal":"ilt","productos_secundarios":[{"producto":"vida","score":3,"motivo":"Validar capital."},{"producto":"hogar","score":2,"motivo":"Revisar cobertura."}],"comercial":{"potencial_comercial":"alto","momento_comercial":"muy_favorable","probabilidad_exito":"alta","tiempo_conversion":"corto_plazo","prioridad_comercial":"A"},"argumento_ganador":"Eres autónomo: tu salud es tu trabajo. Una baja de 3-6 meses sería catastrófica para tu familia. La ILT mantiene los ingresos mientras te recuperas.","objeciones_previsibles":[{"objecion":"Ya tengo vida","respuesta_recomendada":"Vida cubre fallecimiento. ILT cubre si no puedes trabajar."}],"proximo_paso":{"accion_recomendada":"llamada","canal":"telefono","responsable_principal":"natalia","responsable_secundario":"pilar","plazo_recomendado":"máximo 7 días"},"etiquetas_crm":["autonomo","infraproteccion_ilt","vencimiento_proximo","familia_dependiente"],"observaciones_internas":"Edad no proporcionada. Cliente preocupado por ILT. Vencimiento en 3 meses.","empresa":null};
  document.getElementById('jin').value=JSON.stringify(D,null,2);
  render(D);
}
function render(d){
  document.getElementById('zona').style.display='none';
  document.getElementById('dash').style.display='block';
  document.getElementById('alerta').style.display=!d.meta.datos_suficientes?'flex':'none';
  rCliente(d);rObjetivo(d);rScoring(d);rProteccion(d);rResponsable(d);rRiesgos(d);rArgumento(d);rEtiquetas(d);rObs(d);rSect(d);
  document.getElementById('fm').innerHTML='Análisis: '+d.meta.fecha_analisis+' · Modelo v'+d.meta.version_modelo+' · '+d.meta.linea;
}
function rCliente(d){
  const c=d.cliente,e=d.empresa,l=d.meta.linea;
  let h='<div class="ctit">Cliente</div>';
  h+='<div class="cnombre">'+(c.nombre||'Sin nombre')+'</div>';
  h+='<div class="badges"><span class="badge ba">'+(l==='empresas'?'🏢 Empresas':'👤 Particulares')+'</span>';
  if(c.perfil_principal&&c.perfil_principal!='dato_no_disponible')h+='<span class="badge bn">'+c.perfil_principal+'</span>';
  if(c.madurez_aseguradora)h+='<span class="badge bg">'+c.madurez_aseguradora+'</span>';
  h+='</div><div class="cmeta">';
  if(l==='empresas'&&e){h+=mi('Razón social',e.razon_social)+mi('Actividad',e.actividad)+mi('Empleados',e.num_empleados_tramo)+mi('Forma jurídica',e.forma_juridica);}
  else{h+=mi('Perfil secundario',c.perfil_secundario!='sin_perfil_secundario'?c.perfil_secundario:'—')+mi('Situación familiar',c.situacion_familiar)+mi('Situación profesional',c.situacion_profesional)+mi('Edad',c.edad>0?c.edad+' años':'No disponible');}
  h+='</div>';
  document.getElementById('cc').innerHTML=h;
}
function mi(l,v){return '<div class="mi"><label>'+l+'</label><span>'+(v||'—')+'</span></div>';}
function rObjetivo(d){
  const pr=d.comercial?.prioridad_comercial||'—',cls={A:'pa',B:'pb',C:'pc'}[pr]||'pc';
  let h='<div class="ctit">Producto objetivo</div><div class="odet"><div><div class="pgrande '+cls+'">'+pr+'</div></div>';
  h+='<div><div class="oprod">'+(NP[d.producto_objetivo_principal]||d.producto_objetivo_principal)+'</div><div class="olabel">Prioridad inmediata</div></div></div>';
  h+='<div class="cgrid">'+ci('Potencial',d.comercial?.potencial_comercial)+ci('Momento',d.comercial?.momento_comercial)+ci('Probabilidad',d.comercial?.probabilidad_exito)+ci('Conversión',d.comercial?.tiempo_conversion)+'</div>';
  document.getElementById('co').innerHTML=h;
}
function ci(l,v){return '<div class="ci"><label>'+l+'</label><span>'+(v?.replace(/_/g,' ')||'—')+'</span></div>';}
function rScoring(d){
  const sc=d.meta.linea==='empresas'?d.empresa?.scoring_productos_empresa:d.scoring_productos;
  let h='<div class="ctit">Scoring productos</div><div class="slista">';
  if(sc)Object.entries(sc).sort(([,a],[,b])=>b-a).forEach(([p,v])=>{
    h+='<div class="sitem s'+v+'"><div class="slabel">'+(NP[p]||p)+(p==d.producto_objetivo_principal?'<span class="star">★</span>':'')+'</div><div class="sbg"><div class="sfill"></div></div><div class="sval">'+v+'</div></div>';
  });
  document.getElementById('cs').innerHTML=h+'</div>';
}
function rProteccion(d){
  const et={ingresos:'Ingresos',familiar:'Familiar',patrimonial:'Patrimonial',juridica:'Jurídica',sanitaria:'Sanitaria'};
  let h='<div class="ctit">Evaluación protección</div><div class="pgrid">';
  Object.entries(d.evaluacion_proteccion).forEach(([k,v])=>{
    h+='<div class="pitem"><span class="plabel">'+(et[k]||k)+'</span><span class="pval pv-'+v+'">'+(v?.replace(/_/g,' ')||'—')+'</span></div>';
  });
  document.getElementById('cp').innerHTML=h+'</div>';
}
function rResponsable(d){
  const rp=d.proximo_paso,n=rp?.responsable_principal||'—',ic=AI[rp?.accion_recomendada||'']||'📋';
  let h='<div class="ctit">Responsable y acción</div>';
  h+='<div class="rescard"><div class="resav">'+n.slice(0,2).toUpperCase()+'</div><div><div class="resnombre">'+n+'</div><div class="resrol">'+(RR[n]||'')+'</div></div></div>';
  h+='<div class="paso"><div class="pasoico">'+ic+'</div><div><div class="pasotxt">'+((rp?.accion_recomendada||'').toUpperCase())+'</div><div class="pasosub">Plazo: '+(rp?.plazo_recomendado||'—')+'</div></div></div>';
  document.getElementById('cr').innerHTML=h;
}
function rRiesgos(d){
  let h='<div class="ctit">Riesgos detectados</div>';
  d.riesgos_detectados?.forEach(r=>{
    h+='<div class="ritem r'+(r.nivel_riesgo||'medio')+'"><div class="rarea">'+(r.area||'').toUpperCase()+' · '+(r.nivel_riesgo||'')+'</div><div class="rdesc">'+r.descripcion+'</div>'+(r.tipo_dato==='hipotesis'?'<div class="rhip">⚠ Hipótesis pendiente de confirmar</div>':'')+'</div>';
  });
  document.getElementById('ck').innerHTML=h;
}
function rArgumento(d){
  let h='<div class="ctit">Argumento ganador</div><p class="argtxt">"'+(d.argumento_ganador||'—')+'"</p>';
  if(d.productos_secundarios?.length){
    h+='<div style="margin-top:1rem"><div class="ctit" style="margin-bottom:.5rem">Secundarios</div>';
    d.productos_secundarios.forEach(s=>{h+='<div class="sitem s'+s.score+'" style="margin-bottom:.4rem"><div class="slabel">'+(NP[s.producto]||s.producto)+'</div><div class="sbg"><div class="sfill"></div></div><div class="sval">'+s.score+'</div></div>';});
    h+='</div>';
  }
  document.getElementById('ca').innerHTML=h;
}
function rEtiquetas(d){
  let h='<div class="ctit">Etiquetas CRM</div><div class="etags">';
  d.etiquetas_crm?.forEach(e=>{h+='<span class="etag">'+e+'</span>';});
  document.getElementById('ce').innerHTML=h+'</div>';
}
function rObs(d){
  document.getElementById('cb').innerHTML='<div class="ctit">Observaciones internas</div><div class="obstxt">'+(d.observaciones_internas||'—')+'</div>';
}
function rSect(d){
  const c=document.getElementById('cse');
  if(d.meta.linea!=='empresas'||!d.empresa?.oportunidades_sectoriales?.length){c.style.display='none';return;}
  c.style.display='block';
  let h='<div class="ctit">Oportunidades sectoriales</div>';
  d.empresa.oportunidades_sectoriales.forEach(s=>{
    h+='<div class="sectitem"><div class="sectprod">'+(s.producto||'').toUpperCase()+'</div><div class="sectmot">'+s.motivo+'</div><div class="sitem s'+s.score+'" style="width:100px;margin:0"><div class="sbg"><div class="sfill"></div></div><div class="sval">'+s.score+'</div></div></div>';
  });
  c.innerHTML=h;
}
function reset(){document.getElementById('zona').style.display='block';document.getElementById('dash').style.display='none';document.getElementById('jin').value='';D=null;}
function exp(){if(!D)return;const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='DAPEAL_Risk_'+(D.cliente?.nombre?.replace(/\s+/g,'_')||'analisis')+'.json';a.click();}
</script>
</body>
</html>
