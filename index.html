<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAPEAL — Risk Advisor</title>
<style>
  :root {
    --azul: #1B4F8A;
    --azul-oscuro: #133a6b;
    --azul-claro: #e8f0fb;
    --naranja: #E85D24;
    --naranja-claro: #fdf0eb;
    --gris-fondo: #f5f6f8;
    --gris-borde: #e2e5ea;
    --gris-texto: #6b7280;
    --texto: #1a1f2e;
    --blanco: #ffffff;
    --verde: #16a34a;
    --amarillo: #d97706;
    --rojo: #dc2626;
    --rojo-claro: #fef2f2;
    --amarillo-claro: #fffbeb;
    --verde-claro: #f0fdf4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--gris-fondo); color: var(--texto); min-height: 100vh; }

  header {
    background: var(--blanco);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    border-bottom: 3px solid var(--naranja);
  }
  .header-logo img { height: 44px; display: block; }
  .header-right { display: flex; align-items: center; gap: 1rem; }
  .header-subtitulo {
    font-size: 12px;
    color: var(--gris-texto);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .header-badge {
    background: var(--azul-claro);
    color: var(--azul);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid #c5d8f5;
  }

  main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

  #zona-carga { background: var(--blanco); border: 2px dashed var(--gris-borde); border-radius: 12px; padding: 3rem 2rem; text-align: center; margin-bottom: 2rem; }
  #zona-carga:hover { border-color: var(--azul); }
  #zona-carga h2 { font-size: 16px; color: var(--azul); margin-bottom: 0.5rem; font-weight: 600; }
  #zona-carga p { color: var(--gris-texto); font-size: 13px; margin-bottom: 1.25rem; }
  #json-input { width: 100%; height: 140px; border: 1px solid var(--gris-borde); border-radius: 8px; padding: 0.75rem 1rem; font-size: 12px; font-family: 'Courier New', monospace; color: var(--texto); resize: vertical; outline: none; background: var(--gris-fondo); }
  #json-input:focus { border-color: var(--azul); background: white; }
  .btn-primary { background: var(--naranja); color: white; border: none; padding: 10px 28px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 1rem; transition: background 0.2s; }
  .btn-primary:hover { background: #c94d1d; }
  .btn-secondary { background: transparent; color: var(--azul); border: 1px solid var(--azul); padding: 9px 20px; border-radius: 8px; font-size: 13px; cursor: pointer; margin-top: 1rem; margin-left: 0.5rem; }
  .btn-secondary:hover { background: var(--azul-claro); }
  #error-msg { color: var(--rojo); font-size: 13px; margin-top: 0.75rem; display: none; }

  #dashboard { display: none; }
  .grid-top { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .grid-bottom { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .card { background: var(--blanco); border-radius: 10px; padding: 1.25rem 1.5rem; border: 1px solid var(--gris-borde); box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .card-titulo { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--gris-texto); font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.4rem; }
  .card-titulo::before { content: ''; display: inline-block; width: 3px; height: 12px; background: var(--naranja); border-radius: 2px; }

  .cliente-nombre { font-size: 22px; font-weight: 700; color: var(--azul); margin-bottom: 0.75rem; line-height: 1.2; }
  .cliente-badges { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.75rem; }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-azul { background: var(--azul-claro); color: var(--azul); }
  .badge-naranja { background: var(--naranja-claro); color: var(--naranja); }
  .badge-gris { background: var(--gris-fondo); color: var(--gris-texto); }
  .cliente-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  .meta-item label { font-size: 10px; text-transform: uppercase; color: var(--gris-texto); letter-spacing: 0.8px; display: block; margin-bottom: 2px; }
  .meta-item span { font-size: 13px; font-weight: 500; color: var(--texto); }

  .objetivo-producto { font-size: 28px; font-weight: 800; color: var(--naranja); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.25rem; }
  .objetivo-label { font-size: 11px; color: var(--gris-texto); margin-bottom: 1rem; }
  .prioridad-grande { display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 50%; font-size: 20px; font-weight: 900; margin-bottom: 0.75rem; }
  .prioridad-a { background: var(--rojo-claro); color: var(--rojo); }
  .prioridad-b { background: var(--amarillo-claro); color: var(--amarillo); }
  .prioridad-c { background: var(--verde-claro); color: var(--verde); }
  .objetivo-detalles { display: flex; gap: 1rem; align-items: center; }
  .objetivo-info { flex: 1; }
  .comercial-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.75rem; }
  .comercial-item { background: var(--gris-fondo); padding: 0.5rem 0.75rem; border-radius: 6px; }
  .comercial-item label { font-size: 9px; text-transform: uppercase; color: var(--gris-texto); letter-spacing: 0.8px; display: block; margin-bottom: 2px; }
  .comercial-item span { font-size: 12px; font-weight: 600; color: var(--texto); }

  .score-lista { display: flex; flex-direction: column; gap: 0.6rem; }
  .score-item { display: flex; align-items: center; gap: 0.75rem; }
  .score-label { font-size: 12px; color: var(--texto); width: 130px; flex-shrink: 0; font-weight: 500; }
  .score-bar-bg { flex: 1; height: 8px; background: var(--gris-borde); border-radius: 4px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 4px; }
  .score-valor { font-size: 12px; font-weight: 700; width: 16px; text-align: right; flex-shrink: 0; }
  .score-0 .score-bar-fill { background: var(--gris-borde); width: 0%; }
  .score-1 .score-bar-fill { background: #93c5fd; width: 20%; }
  .score-2 .score-bar-fill { background: #60a5fa; width: 40%; }
  .score-3 .score-bar-fill { background: var(--amarillo); width: 60%; }
  .score-4 .score-bar-fill { background: var(--naranja); width: 80%; }
  .score-5 .score-bar-fill { background: var(--rojo); width: 100%; }
  .score-0 .score-valor { color: var(--gris-borde); }
  .score-1 .score-valor { color: #93c5fd; }
  .score-2 .score-valor { color: #60a5fa; }
  .score-3 .score-valor { color: var(--amarillo); }
  .score-4 .score-valor { color: var(--naranja); }
  .score-5 .score-valor { color: var(--rojo); }
  .score-estrella { color: var(--naranja); font-size: 10px; margin-left: 2px; }

  .proteccion-grid { display: flex; flex-direction: column; gap: 0.5rem; }
  .proteccion-item { display: flex; align-items: center; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid var(--gris-fondo); }
  .proteccion-label { font-size: 12px; color: var(--texto); font-weight: 500; }
  .proteccion-valor { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
  .prot-deficiente { background: var(--rojo-claro); color: var(--rojo); }
  .prot-adecuada { background: var(--amarillo-claro); color: var(--amarillo); }
  .prot-buena { background: #eff6ff; color: #2563eb; }
  .prot-excelente { background: var(--verde-claro); color: var(--verde); }
  .prot-dato_no_disponible { background: var(--gris-fondo); color: var(--gris-texto); }

  .responsable-card { display: flex; align-items: center; gap: 1rem; padding: 1rem; background: var(--azul-claro); border-radius: 8px; margin-bottom: 1rem; }
  .responsable-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--azul); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 15px; flex-shrink: 0; }
  .responsable-nombre { font-size: 16px; font-weight: 700; color: var(--azul); text-transform: capitalize; }
  .responsable-rol { font-size: 11px; color: var(--gris-texto); }
  .proximo-paso { background: var(--naranja); color: white; padding: 0.75rem 1rem; border-radius: 8px; display: flex; align-items: center; gap: 0.75rem; }
  .proximo-paso-icono { font-size: 18px; }
  .proximo-paso-texto { font-size: 13px; font-weight: 600; }
  .proximo-paso-sub { font-size: 11px; opacity: 0.85; }

  .argumento-texto { font-size: 14px; line-height: 1.65; color: var(--texto); font-style: italic; border-left: 3px solid var(--naranja); padding-left: 1rem; }
  .etiquetas-wrap { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .etiqueta { background: var(--azul-claro); color: var(--azul); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }

  .riesgo-item { padding: 0.75rem; border-radius: 8px; margin-bottom: 0.5rem; border-left: 3px solid; }
  .riesgo-critico { background: var(--rojo-claro); border-color: var(--rojo); }
  .riesgo-alto { background: var(--naranja-claro); border-color: var(--naranja); }
  .riesgo-medio { background: var(--amarillo-claro); border-color: var(--amarillo); }
  .riesgo-bajo { background: var(--verde-claro); border-color: var(--verde); }
  .riesgo-area { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; margin-bottom: 3px; }
  .riesgo-critico .riesgo-area { color: var(--rojo); }
  .riesgo-alto .riesgo-area { color: var(--naranja); }
  .riesgo-medio .riesgo-area { color: var(--amarillo); }
  .riesgo-desc { font-size: 12px; color: var(--texto); line-height: 1.5; }
  .riesgo-hipotesis { font-size: 10px; color: var(--gris-texto); margin-top: 3px; font-style: italic; }

  .observaciones-texto { font-size: 12px; line-height: 1.7; color: var(--texto); background: var(--gris-fondo); padding: 0.75rem; border-radius: 6px; }
  .card-full { margin-bottom: 1rem; }

  .dashboard-footer { display: flex; align-items: center; justify-content: space-between; padding: 1rem 0; border-top: 1px solid var(--gris-borde); margin-top: 1rem; }
  .footer-meta { font-size: 11px; color: var(--gris-texto); }
  .footer-acciones { display: flex; gap: 0.5rem; }

  .sectorial-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0; border-bottom: 1px solid var(--gris-fondo); }
  .sectorial-producto { font-size: 11px; font-weight: 600; color: var(--azul); width: 160px; text-transform: uppercase; letter-spacing: 0.5px; }
  .sectorial-motivo { font-size: 12px; color: var(--gris-texto); flex: 1; }

  .alerta-datos { background: var(--amarillo-claro); border: 1px solid #fcd34d; border-radius: 8px; padding: 0.75rem 1rem; font-size: 12px; color: #92400e; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }

  @media (max-width: 768px) { .grid-top, .grid-bottom { grid-template-columns: 1fr; } }
</style>
</head>
